name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gigit
          POSTGRES_PASSWORD: gigit
          POSTGRES_DB: gigit
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U gigit" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://gigit:gigit@localhost:5433/gigit
      SESSION_SECRET: ci-session-secret-0123456789abcdef0123456789
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @gigit/web build
